# This workflow will build a Java project and deploy it to an Azure Functions App on Windows or Linux when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure Functions app.
# For instructions see https://learn.microsoft.com/en-us/azure/azure-functions/create-first-function-vs-code-java
#
# To configure this workflow:
# 1. Set up the following secrets in your repository:
#   - AZURE_FUNCTIONAPP_PUBLISH_PROFILE
# 2. Change env variables for your configuration.
#
# For more information on:
#   - GitHub Actions for Azure: https://github.com/Azure/Actions
#   - Azure Functions Action: https://github.com/Azure/functions-action
#   - Publish Profile: https://github.com/Azure/functions-action#using-publish-profile-as-deployment-credential-recommended
#   - Azure Service Principal for RBAC: https://github.com/Azure/functions-action#using-azure-service-principal-for-rbac-as-deployment-credential
#
# For more samples to get started with GitHub Action workflows to deploy to Azure: https://github.com/Azure/actions-workflow-samples/tree/master/FunctionApp

name: Deploy Java project to Azure Function App

on:
  push:
    branches: ["master"]

env:
  AZURE_FUNCTIONAPP_NAME: 'courseWorkBot'
  POM_XML_DIRECTORY: '.'
  DISTRIBUTION: 'zulu'
  JAVA_VERSION: '17'  # Рекомендую использовать 11 или 17 для Spring Boot
  RESOURCE_GROUP: 'homeWork'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest  # Можно использовать ubuntu для экономии
    environment: dev
    steps:
      - name: 'Checkout GitHub Action'
        uses: actions/checkout@v4

      - name: 'Login via Azure CLI'
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_RBAC_CREDENTIALS }}

      - name: Setup Java Sdk ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          distribution: ${{ env.DISTRIBUTION }}
          java-version: ${{ env.JAVA_VERSION }}

      - name: 'Restore Project Dependencies Using Mvn'
        run: |
          cd ${{ env.POM_XML_DIRECTORY }}
          mvn clean package

      - name: 'Configure Application Settings'
        run: |
          az functionapp config appsettings set \
            --name ${{ env.AZURE_FUNCTIONAPP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --settings \
              spring.datasource.url=jdbc:postgresql://tgbot-b4ntik-7cbd.h.aivencloud.com:15059/defaultdb?sslmode=require&useUnicode=true&characterEncoding=UTF-8&stringtype=unspecified
              spring.datasource.username=${{ secrets.DB_USERNAME }} \
              spring.datasource.password=${{ secrets.DB_PASSWORD }} \
              telegram.bot.token=${{ secrets.TELEGRAM_BOT_TOKEN }} \
              spring.datasource.driver-class-name=org.postgresql.Driver \
              spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect \
              spring.jpa.hibernate.ddl-auto=validate \
              spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect \
              spring.jpa.properties.hibernate.connection.charSet=UTF-8 \
              spring.jpa.properties.hibernate.connection.characterEncoding=UTF-8 \
              spring.jpa.properties.hibernate.connection.useUnicode=true \
              spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true \
              spring.jpa.show-sql=true \
              spring.jpa.properties.hibernate.format_sql=true \
              spring.jpa.defer-datasource-initialization=true \
              spring.liquibase.enabled=false \
              spring.liquibase.default-schema=public \
              spring.liquibase.liquibase-schema=public \
              spring.liquibase.show-sql=true \
              spring.liquibase.format-sql=true

      - name: 'Run Azure Functions Action'
        uses: Azure/functions-action@v1
        id: fa
        with:
          app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
          package: '${{ env.POM_XML_DIRECTORY }}'
          publish-profile: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
          respect-pom-xml: true
